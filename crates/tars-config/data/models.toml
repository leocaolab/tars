# ────────────────────────────── Gemini ────────────────────────────────
# base: Google Generative Language API  ·  key: GEMINI_API_KEY
# "Off" knob differs by generation: 3.x uses `thinking_level:"minimal"`,
# 2.5 uses `thinkingBudget:0`. thinking="only" models REJECT any off signal
# (this is the gemini-2.5-pro bug). Prices are the ≤200k-token tier.
[providers.gemini]
default = "gemini-3.5-flash"  # NOT thinking-only → an Off default actually works

[[providers.gemini.models]]
id = "gemini-3.5-flash"
tier = "fast"
input = 1.50
output = 9.00
cached_input = 0.15
context = 1_000_000
max_output = 65_000
thinking = "optional"        # levels minimal/low/medium/high; `minimal` = off
thinking_param = "level"     # 3.x → thinking_level (docs), not thinkingBudget
modalities = ["text", "vision", "audio", "video", "pdf"]
status = "ga"

[[providers.gemini.models]]
id = "gemini-3.1-pro-preview"
tier = "flagship"
input = 2.00                 # >200k tier: 4.00 in / 18.00 out
output = 12.00
cached_input = 0.20
context = 1_000_000
max_output = 64_000
thinking = "only"            # levels low/medium/high; default high; cannot disable
thinking_param = "level"     # 3.x
modalities = ["text", "vision", "audio", "video"]
status = "preview"

[[providers.gemini.models]]
id = "gemini-3.1-flash-lite"
tier = "lite"
input = 0.25
output = 1.50
cached_input = 0.025
context = 1_000_000
max_output = 64_000
thinking = "optional"        # default `minimal` (off)
thinking_param = "level"     # 3.x
modalities = ["text", "vision", "audio", "video"]
status = "ga"

[[providers.gemini.models]]
id = "gemini-2.5-pro"
tier = "legacy"
input = 1.25                 # >200k tier: 2.50 / 15.00
output = 10.00
cached_input = 0.125
context = 1_000_000
thinking = "only"            # thinkingBudget min ~128; 0 REJECTED — the bug source
thinking_param = "budget"    # 2.5
modalities = ["text", "vision", "audio", "video", "pdf"]
status = "ga"                # previous-gen but still served

[[providers.gemini.models]]
id = "gemini-2.5-flash"
tier = "fast"
input = 0.30
output = 2.50
cached_input = 0.03
context = 1_000_000
thinking = "optional"        # thinkingBudget:0 disables
thinking_param = "budget"    # 2.5
modalities = ["text", "vision", "audio", "video", "pdf"]
status = "ga"

[[providers.gemini.models]]
id = "gemini-2.0-flash"
tier = "legacy"
thinking = "optional"
status = "deprecated"        # SHUT DOWN — 404 on generateContent

