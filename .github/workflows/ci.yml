name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin a recent stable Rust so contributor toolchain drift doesn't
  # break the workspace. Keep aligned with `Cargo.toml#rust-version`.
  RUST_TOOLCHAIN: stable

jobs:
  rust:
    name: rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      # Skip tars-py here — it links libpython at test time, which
      # this image doesn't satisfy without extra setup. Coverage
      # for tars-py lives in the dedicated `python` job below.
      - name: cargo test (workspace minus tars-py)
        run: cargo test --workspace --exclude tars-py --no-fail-fast

      - name: cargo clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  python:
    name: tars-py wheel + pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin + pytest
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest

      - name: maturin build (release wheel)
        working-directory: crates/tars-py
        run: maturin build --release --out ../../target/wheels

      - name: pip install built wheel
        run: pip install --force-reinstall target/wheels/tars-*.whl

      # A minimal config so the construction/config tests (e.g. builder
      # layer-name assertions) can resolve a provider object. The
      # base_url points at a dead port on purpose — these tests build the
      # provider and assemble the onion but never call it. Tests that DO
      # make a live call are marked `requires_provider` and excluded below.
      - name: Write minimal ~/.tars/config.toml
        run: |
          mkdir -p "$HOME/.tars"
          cat > "$HOME/.tars/config.toml" <<'TOML'
          [providers.qwen_coder_local]
          type = "openai_compat"
          default_model = "qwen/qwen3-coder-30b"
          base_url = "http://127.0.0.1:1234/v1"
          TOML

      # Run everything except the `requires_provider`-marked tests (those
      # need a live LLM on :1234, which CI doesn't supply — they run
      # locally via the wheel install documented in CONTRIBUTING.md).
      # New construction/config tests are included automatically; no
      # hand-maintained `-k` allowlist to keep in sync.
      - name: pytest (everything except live-provider tests)
        run: |
          pytest crates/tars-py/python/tests \
            -q \
            -m 'not requires_provider' \
            --no-header
