<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TARS Desktop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="tabs">
          <button id="tab-chats" class="tab active">Chats</button>
          <button id="tab-traces" class="tab" title="Trajectories from the shared store (incl. arc runs)">Traces</button>
        </div>
        <button id="newchat" class="newchat" title="New chat">＋</button>
      </div>
      <div id="convlist" class="convlist"></div>
    </aside>

    <div class="main">
      <header class="topbar">
        <select id="provider" class="select" title="Provider / model"></select>
        <input id="system" class="system" placeholder="System prompt (applies to new chats)…" />
        <div class="spacer"></div>
        <label class="maxtok">
          max tokens
          <input id="maxtok" type="number" min="1" placeholder="default" />
        </label>
      </header>

      <main id="transcript" class="transcript">
        <div class="empty" id="empty">Send a message to start.</div>
      </main>

      <footer class="composer">
        <textarea
          id="input"
          class="input"
          rows="1"
          placeholder="Send a message to the model…  (⌘/Ctrl+Enter to send)"
        ></textarea>
        <button id="send" class="send">Send</button>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
