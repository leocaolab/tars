# Provider definition DB — DATA, not code. Supersedes data/models.toml.
#
# tars-authored (NOT the user's ~/.tars/config.toml). Shipped in the binary
# via include_str! and parsed once into MODEL_KB (crates/tars-config/src/
# model_kb.rs). Each `[providers.X]` block carries how tars reaches the
# provider (`interface`), how it bills (`billed`), the provider-level
# capability facts (`[providers.X.capabilities]`), and its model rows.
#
# Numbers here are transcribed faithfully from the research pass
# (provider-research/DATA.md). Prices are STANDARD-tier USD per 1M tokens;
# tiered / intro / audio prices live in comments, not fields. A value the
# research couldn't confirm is left blank with a `# UNKNOWN` comment; a value
# that is genuinely absent (subscription/local — no per-token price; no
# documented ceiling) is left blank, meaning "no limit / no charge".
#
# NOTE on CLI providers: the `capabilities` here are what TARS advertises, not
# the CLI's native transport. Every CLI runs under the buffered AgentCliBackend
# (emit-after-turn), so tars advertises `streaming=false` + `cancel=false` even
# where the underlying CLI streams / interrupts (preserving the registry
# CLI-conformance invariant). DATA.md's native cancel/stream notes are kept in
# comments per provider.

schema_version = 2
verified = "2026-07-10"

# ═══════════════════════════════ HTTP providers ═══════════════════════════════

# ─────────────────────────────────── OpenAI ───────────────────────────────────
