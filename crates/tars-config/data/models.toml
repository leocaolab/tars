# Model Knowledge Base — DATA, not code.
#
# Model IDs, prices, context windows and capabilities change FASTER than tars
# releases. They must NOT live as string literals in `builtin.rs` / pricing /
# capabilities code — a hardcoded default goes stale in months (as of 2026-07,
# the old `gpt-4o` / `claude-opus-4-7` / `gemini-2.5-pro` defaults were all a
# generation behind, and `gemini-2.5-pro` is thinking-only so it broke the
# thinking-off default). Update THIS FILE when a model ships or retires — no code
# change, no recompile.
#
# Every row below was verified against the provider's OFFICIAL docs on the date
# in `verified`. Fields flagged `# VERIFY` disagreed across sources — re-check the
# official pricing page before relying on the number.
#
# Schema (per model): id (exact API string), tier, prices USD/1M tokens
# (input / output / cached_input), context (input tokens), max_output,
# thinking ("none" = never reasons | "optional" = toggleable | "only" = mandatory,
# rejects an "off" signal), modalities (input), status ("ga"|"preview"|
# "deprecated"), retire (ISO date if deprecated), aliases.

schema_version = 1
verified = "2026-07-05"

# ─────────────────────────────── OpenAI ───────────────────────────────
