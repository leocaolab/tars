# ───────────── opencode — BYO-key frontend over models.dev (open set) ──────────
# No fixed model set (selected as provider/model), so NO model rows and no
# default. billed=subscription is the closest marker: tars sees no per-token
# price (upstream is BYO-key per-token — the invariant never fires either way,
# there being no rows).
[providers.opencode]
interface = "cli"
billed = "subscription"

  [providers.opencode.capabilities]
  structured_output = "none"  # no schema
  tool_use = false
  parallel_tool_calls = false
  cancel = false             # UNKNOWN native (kill-subprocess)
  streaming = false          # UNKNOWN native (treat non-streaming)
  prompt_cache = "delegated"
# UNKNOWN: per-CLI output limit, headless schema, machine stream contract.

# ─────────────────── antigravity (agy) — WEAKEST DATA ─────────────────────────
# Google account sub. Model id strings NOT documented; only `/model
# gemini-3.1-pro` confirmed. NON-TTY STDOUT DROP BUG (issue #76): `-p` under a
# pipe/subprocess silently drops stdout — exactly how tars runs it.
[providers.antigravity]
interface = "cli"
billed = "subscription"
default = "gemini-3.1-pro"

  [providers.antigravity.capabilities]
  structured_output = "none"
  tool_use = false
  parallel_tool_calls = false
  cancel = false             # UNKNOWN native (kill-subprocess)
  streaming = false          # UNKNOWN native (non-TTY stdout DROP bug #76)
  prompt_cache = "delegated"

[[providers.antigravity.models]]
id = "gemini-3.1-pro"
tier = "flagship"
thinking = "optional"       # UNKNOWN — only the id is confirmed; conservative fill
modalities = ["text"]
status = "ga"
